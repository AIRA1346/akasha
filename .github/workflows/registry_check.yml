name: Registry Check

on:
  push:
    paths:
      - 'akasha-db/**'
      - 'assets/registry/**'
      - 'tool/**'
      - 'lib/models/registry_models.dart'
      - 'test/*registry*'
      - 'test/*bundle*'
      - 'scripts/build_release.ps1'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/registry_check.yml'
  pull_request:
    paths:
      - 'akasha-db/**'
      - 'assets/registry/**'
      - 'tool/**'
      - 'lib/models/registry_models.dart'
      - 'test/*registry*'
      - 'test/*bundle*'
      - 'scripts/build_release.ps1'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/registry_check.yml'

jobs:
  registry-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze tool scripts
        run: dart analyze tool

      - name: Preflight gates
        run: dart run tool/preflight_check.dart

      - name: Validate registry shards and franchise groups
        run: dart run tool/ci_registry_check.dart --skip-bundle --skip-dedupe

      - name: Full-bundle focused tests
        run: >-
          flutter test
          test/registry_bundle_builder_test.dart
          test/registry_provenance_model_test.dart
          test/bundle_full_registry_test.dart
          test/catalog_scale_baseline_strict_test.dart

      - name: Catalog bundle baseline (strict)
        run: dart run tool/catalog_scale_baseline.dart --strict
