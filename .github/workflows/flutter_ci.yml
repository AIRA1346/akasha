name: Flutter CI

on:
  push:
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos lib/

      - name: Test
        run: flutter test

      - name: Quality gate (strict)
        run: dart run tool/quality_gate.dart --strict

      - name: Registry check
        run: dart run tool/ci_registry_check.dart
