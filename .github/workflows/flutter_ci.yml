name: Flutter CI

on:
  push:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'akasha-db/**'
      - 'assets/registry/**'
      - 'tool/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'akasha-db/**'
      - 'assets/registry/**'
      - 'tool/**'

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos lib/

      - name: Test
        run: flutter test

      - name: Analyze and test commerce domain
        working-directory: packages/akasha_commerce_domain
        run: |
          dart pub get
          dart analyze
          dart test

      - name: Analyze and test commerce backend
        working-directory: backend/akasha_commerce_server
        run: |
          dart pub get
          dart analyze
          dart test
